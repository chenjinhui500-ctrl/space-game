<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Game Canvas Prototype</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <h1>Space Game</h1>
        <p>无依赖 Canvas 原型：移动、射击、观察星球攻击范围。</p>
      </header>
      <canvas id="game-canvas" width="960" height="640" aria-label="Space game canvas"></canvas>
      <p class="game-help">移动：WASD / 方向键　射击：空格</p>
    </main>
    <script src="src/main.js"></script>
  </body>
</html>
